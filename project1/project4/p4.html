<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lamp Login</title>
    <link rel="stylesheet" href="p4.css">
</head>
<body>

<div class="container">

    <!-- Lamp Side -->
    <div class="lamp-side">
        <div class="lamp-container" id="lampContainer">
            <div class="lamp-shade" id="lampShade"></div>
            <div class="lamp-pole"></div>
            <div class="lamp-base"></div>

            <div class="pull-rope" id="pullRope"></div>
            <div class="rope-handle" id="ropeHandle"></div>
        </div>
    </div>

    <!-- Login Side -->
    <div class="login-side">
        <div class="login-form hidden" id="loginForm">
            <h2>WELCOME</h2>
            <input type="text" placeholder="Username">
            <input type="password" placeholder="Password">
            <button class="signin-button">Sign In</button>
        </div>
    </div>

</div>

<script src="p4.js"></script>
</body>
</html>
