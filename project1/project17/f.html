<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Digital Clock</title>
    <link rel="stylesheet" href="f.css">
</head>
<body>

    <canvas id="particles"></canvas>

    <div class="container">
        <h1>FUTURE CLOCK</h1>

        <div class="clock">
            <div class="box">
                <span id="hours">00</span>
                <p>Hours</p>
            </div>

            <div class="box">
                <span id="minutes">00</span>
                <p>Minutes</p>
            </div>

            <div class="box">
                <span id="seconds">00</span>
                <p>Seconds</p>
            </div>
        </div>

        <div class="date">
            <h2 id="date"></h2>
        </div>

        <div class="greeting">
            <h3 id="greeting">Welcome</h3>
        </div>
    </div>

<script src="f.js"></script>
</body>
</html>
